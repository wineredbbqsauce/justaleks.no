<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blogg — justaleks.no (demo)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-primary: #0f0f0f;
        --bg-secondary: #171716;
        --bg-surface: #1a1a1c;
        --text-primary: #e8e6e1;
        --text-muted: #a3a099;
        --accent: #8b7355;
        --accent-dim: #6b705c;
        --border: rgba(232, 230, 225, 0.07);
        --radius: 4px;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: "IBM Plex Mono", monospace;
        font-weight: 300;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      ::selection {
        background: var(--accent);
        color: var(--bg-primary);
      }

      img {
        display: block;
        max-width: 100%;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        background: none;
        border: none;
        cursor: pointer;
        color: inherit;
        font: inherit;
      }

      .serif {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        letter-spacing: -0.02em;
      }

      .mono {
        font-family: "IBM Plex Mono", monospace;
      }

      .label {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.68rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 24px;
      }

      .wrap-narrow {
        max-width: 700px;
        margin: 0 auto;
        padding: 0 24px;
      }

      @media (min-width: 768px) {
        .wrap,
        .wrap-narrow {
          padding: 0 40px;
        }
      }

      .demo-bar {
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
        padding: 10px 24px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.62rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .demo-bar .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 0;
        font-size: 0.68rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
        transition: color 0.3s;
        margin-bottom: 24px;
      }

      .back-link:hover {
        color: var(--text-primary);
      }

      .back-link svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 1.2;
        fill: none;
        transition: transform 0.3s;
      }

      .back-link:hover svg {
        transform: translateX(-3px);
      }

      .blog-header {
        padding: 56px 0 40px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 40px;
      }

      .blog-title {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-size: clamp(2.2rem, 5vw, 3.6rem);
        line-height: 1;
        letter-spacing: -0.02em;
        color: var(--text-primary);
        margin: 16px 0 22px;
      }

      .blog-title em {
        font-style: italic;
        color: var(--accent);
      }

      .blog-desc {
        font-size: 0.8rem;
        line-height: 1.7;
        color: var(--text-muted);
        max-width: 500px;
      }

      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 40px;
      }

      .filter-btn {
        padding: 8px 16px;
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
        border: 1px solid rgba(232, 230, 225, 0.1);
        border-radius: var(--radius);
        transition: all 0.3s;
        cursor: pointer;
      }

      .filter-btn:hover {
        border-color: var(--accent);
        color: var(--text-primary);
      }

      .filter-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--bg-primary);
      }

      .post-list {
        display: flex;
        flex-direction: column;
        margin-bottom: 56px;
      }

      .post-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 26px 0;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition:
          padding-left 0.4s,
          border-color 0.4s;
      }

      .post-row:hover {
        border-color: rgba(139, 115, 85, 0.4);
      }

      @media (min-width: 700px) {
        .post-row {
          grid-template-columns: 110px 1fr auto;
          align-items: baseline;
          gap: 28px;
        }

        .post-row:hover {
          padding-left: 12px;
        }
      }

      .post-date {
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--accent-dim);
        white-space: nowrap;
      }

      .post-main {
        min-width: 0;
      }

      .post-title {
        font-family: "Cormorant Garamond", serif;
        font-weight: 400;
        font-size: 1.4rem;
        line-height: 1.25;
        color: var(--text-primary);
        transition: color 0.3s;
        margin-bottom: 6px;
      }

      .post-row:hover .post-title {
        color: var(--accent);
      }

      .post-title em {
        font-style: italic;
      }

      .post-excerpt {
        font-size: 0.78rem;
        line-height: 1.6;
        color: var(--text-muted);
        max-width: 56ch;
      }

      .post-tag {
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
        white-space: nowrap;
        align-self: start;
      }

      .post-article-header {
        padding: 48px 0 32px;
      }

      .post-article-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
        margin-bottom: 18px;
      }

      .post-article-title {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.1;
        letter-spacing: -0.02em;
        color: var(--text-primary);
        margin-bottom: 18px;
      }

      .post-article-title em {
        font-style: italic;
        color: var(--accent);
      }

      .post-article-excerpt {
        font-size: 0.85rem;
        line-height: 1.7;
        color: var(--text-muted);
        max-width: 560px;
      }

      .post-article-body {
        font-size: 0.92rem;
        line-height: 1.85;
        color: var(--text-primary);
        padding-bottom: 60px;
      }

      .post-article-body p {
        margin-bottom: 1.4em;
      }

      .post-article-body h2 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 400;
        font-style: italic;
        font-size: 1.5rem;
        color: var(--accent);
        margin: 1.8em 0 0.6em;
      }

      .post-article-body h3 {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-primary);
        margin: 1.6em 0 0.7em;
      }

      .post-article-body ul {
        margin: 0 0 1.4em 1.2em;
      }

      .post-article-body li {
        margin-bottom: 0.5em;
      }

      .post-article-body code {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.85em;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.15em 0.4em;
      }

      .post-empty {
        padding: 56px 0;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.75rem;
        letter-spacing: 0.1em;
      }

      .blog-footer {
        border-top: 1px solid var(--border);
        padding: 36px 0;
        text-align: center;
      }

      .blog-footer p {
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent-dim);
      }
    </style>
  </head>
  <body>
    <div class="demo-bar">
      <span class="dot"></span>
      Live frontend-demo — under arbeid 🚧
    </div>

    <div class="wrap" id="listView">
      <a
        href="#"
        class="back-link"
        style="margin-top: 24px"
        onclick="return false;"
      >
        <svg viewBox="0 0 24 24">
          <line x1="19" y1="12" x2="5" y2="12" />
          <polyline points="12,19 5,12 12,5" />
        </svg>
        Tilbake til portefølje
      </a>

      <header class="blog-header">
        <span class="label">[ Blogg ]</span>
        <h1 class="blog-title">Notater<br /><em>fra verkstedet.</em></h1>
        <p class="blog-desc">
          Korte og lange tekster om det jeg bygger — kode, prosjekter, og ting
          jeg har lært på veien.
        </p>
      </header>

      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-filter="all">Alle</button>
        <button class="filter-btn" data-filter="kode">Kode</button>
        <button class="filter-btn" data-filter="prosjekt">Prosjekt</button>
        <button class="filter-btn" data-filter="notat">Notat</button>
      </div>

      <div class="post-list" id="postList"></div>
    </div>

    <div class="wrap-narrow" id="postView" style="display: none">
      <a href="#" class="back-link" style="margin-top: 24px" id="backToList">
        <svg viewBox="0 0 24 24">
          <line x1="19" y1="12" x2="5" y2="12" />
          <polyline points="12,19 5,12 12,5" />
        </svg>
        Tilbake til blogg
      </a>
      <div id="postRoot"></div>
    </div>

    <footer class="blog-footer">
      <div class="wrap">
        <p>© 2025 Aleks — Oslo, NO</p>
      </div>
    </footer>

    <script src="blog.js"></script>
  </body>
</html>
