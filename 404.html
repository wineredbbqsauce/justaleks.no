<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — justaleks.no</title>
    <meta name="description" content="Denne siden finnes ikke — justaleks.no" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/x-icon" href="assets/placeholder-circle.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ══════════ RESET ══════════ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-primary: #0f0f0f;
        --bg-secondary: #171716;
        --text-primary: #e8e6e1;
        --text-muted: #a3a099;
        --accent: #8b7355;
        --accent-dim: #6b705c;
        --border: rgba(232, 230, 225, 0.07);
      }

      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: "IBM Plex Mono", monospace;
        font-weight: 300;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* ══════════ GRAIN ══════════ */
      .grain {
        position: fixed;
        inset: 0;
        z-index: 9998;
        pointer-events: none;
        opacity: 0.07;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.9 0 0 0 0 0.9 0 0 0 0 0.85 0 0 0 1 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      /* ══════════ 404 CONTAINER ══════════ */
      .error-container {
        text-align: center;
        padding: 48px 24px;
        position: relative;
        z-index: 1;
        max-width: 600px;
      }

      /* ══════════ STOR 404 ══════════ */
      .error-code {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-size: clamp(6rem, 20vw, 12rem);
        line-height: 0.85;
        color: var(--text-primary);
        margin-bottom: 16px;
        letter-spacing: -0.03em;
        animation: fadeIn 1s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .error-code em {
        font-style: italic;
        color: var(--accent);
      }

      /* ══════════ MELDING ══════════ */
      .error-label {
        font-size: 0.68rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 16px;
        animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
      }

      .error-title {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-size: clamp(1.5rem, 4vw, 2rem);
        color: var(--text-primary);
        margin-bottom: 24px;
        animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
      }

      .error-desc {
        font-size: 0.8rem;
        line-height: 1.7;
        color: var(--text-muted);
        margin-bottom: 40px;
        animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
      }

      /* ══════════ KNAPPER ══════════ */
      .error-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        justify-content: center;
        animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.65s both;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 24px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.68rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-decoration: none;
        transition: all 0.35s;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--accent);
        color: var(--bg-primary);
        border: 1px solid var(--accent);
      }

      .btn-primary:hover {
        background: transparent;
        color: var(--accent);
      }

      .btn-ghost {
        color: var(--text-muted);
        border: 1px solid rgba(232, 230, 225, 0.15);
      }

      .btn-ghost:hover {
        border-color: var(--accent);
        color: var(--text-primary);
      }

      .btn svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        stroke-width: 1.2;
        fill: none;
      }

      /* ══════════ DEKORATIV KODE ══════════ */
      .code-snippet {
        margin-top: 48px;
        font-size: 0.6rem;
        letter-spacing: 0.15em;
        color: var(--accent-dim);
        opacity: 0.5;
        animation: fadeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1s both;
      }

      .code-snippet span {
        color: var(--text-muted);
      }

      /* ══════════ ANIMASJONER ══════════ */
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ══════════ BLINKENDE CURSOR ══════════ */
      .cursor {
        display: inline-block;
        width: 8px;
        height: 16px;
        background: var(--accent);
        margin-left: 4px;
        animation: blink 1s steps(2) infinite;
        vertical-align: middle;
      }

      @keyframes blink {
        to {
          visibility: hidden;
        }
      }
    </style>
  </head>
  <body>
    <!-- Grain overlay -->
    <div class="grain" aria-hidden="true"></div>

    <div class="error-container">
      <!-- 404 -->
      <h1 class="error-code">4<em>0</em>4</h1>

      <!-- Label -->
      <p class="error-label">[ Siden finnes ikke ]</p>

      <!-- Tittel -->
      <p class="error-title">Denne siden har<br />forvillet seg bort.</p>

      <!-- Beskrivelse -->
      <p class="error-desc">
        Kanskje du skrev feil URL, kanskje siden ble fjernet,<br />
        eller kanskje den aldri eksisterte i utgangspunktet.<br />
        Uansett — du er ikke der du skulle være.
      </p>

      <!-- Knapper -->
      <div class="error-actions">
        <a href="/" class="btn btn-primary">
          <svg viewBox="0 0 24 24">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12,19 5,12 12,5" />
          </svg>
          Tilbake hjem
        </a>
        <a href="mailto:kontakt@justaleks.no" class="btn btn-ghost">
          <svg viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22,2 15,22 11,13 2,9" />
          </svg>
          Si ifra
        </a>
      </div>

      <!-- Dekorativ kode -->
      <p class="code-snippet">
        <span>if</span> (page <span>===</span> undefined) {<br />
        &nbsp;&nbsp;redirect(<span>"/"</span>);<br />
        }<span class="cursor"></span>
      </p>
    </div>
  </body>
</html>
